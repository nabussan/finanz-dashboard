# ── Layer 4: FX (vs UUP) ────────────────────────────────────────────────────────
# ETF-Proxies für Währungsrotation gegen US Dollar.
# RS-Ratio einer FX-ETF vs UUP zeigt relative Währungsstärke.
fx:
  - ticker: FXE
    name: EUR/USD
    layer: fx
    benchmark: UUP
    ucits: null

  - ticker: FXY
    name: JPY/USD
    layer: fx
    benchmark: UUP
    ucits: null

